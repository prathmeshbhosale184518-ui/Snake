<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="color-scheme" content="dark">
<title>Snake — Arcade Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1014;
    --panel:#15171c;
    --panel-2:#1b1e24;
    --border:#2a2d34;
    --border-soft:#21242a;
    --text:#eef0f3;
    --text-muted:#868c97;
    --text-faint:#565b64;
    --accent:#ff8a3d;
    --accent-strong:#ffae73;
    --accent-soft:rgba(255,138,61,0.14);
    --mint:#5fe3b3;
    --danger:#ff5d5d;
    --radius-lg:20px;
    --radius-md:12px;
    --radius-sm:8px;
    --font-display:'Space Grotesk', system-ui, sans-serif;
    --font-mono:'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }

  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    background-color:var(--bg);
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.045) 1px, transparent 0);
    background-size: 22px 22px;
    font-family:var(--font-display);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }

  .page{ display:flex; flex-direction:column; align-items:center; gap:18px; width:100%; }

  .device{
    width:100%;
    max-width:560px;
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    padding:28px 28px 24px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .eyebrow-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .eyebrow{ font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--text-faint); }

  .led{ display:flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; color:var(--text-muted); }
  .led__dot{ width:7px; height:7px; border-radius:50%; background:var(--text-faint); transition:background .2s, box-shadow .2s; }
  .led.is-running .led__dot{ background:var(--danger); box-shadow:0 0 8px 1px var(--danger); animation:blink 1.4s steps(2,jump-none) infinite; }
  .led.is-paused .led__dot{ background:var(--accent); box-shadow:0 0 8px 1px var(--accent); }
  .led.is-over .led__dot{ background:var(--text-faint); box-shadow:none; }
  @keyframes blink{ 50%{ opacity:0.35; } }

  .title{ font-size:42px; font-weight:700; letter-spacing:0.02em; margin:2px 0 18px; }

  .divider{ height:1px; background:var(--border-soft); margin:0 0 18px; }

  .settings-row{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap; }

  .segmented{ display:inline-flex; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:var(--radius-sm); padding:3px; gap:2px; }
  .segmented__btn{ font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; padding:6px 12px; border-radius:6px; border:none; background:transparent; color:var(--text-muted); cursor:pointer; transition:background .15s, color .15s, opacity .15s; }
  .segmented__btn.is-active{ background:var(--accent-soft); color:var(--accent-strong); }
  .segmented__btn:hover:not(.is-active):not(:disabled){ color:var(--text); }
  .segmented__btn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .segmented__btn:disabled{ opacity:.45; cursor:not-allowed; }

  .toggle{ display:flex; align-items:center; gap:8px; cursor:pointer; }
  .toggle__label{ font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; color:var(--text-muted); }
  .toggle__switch{ position:relative; display:inline-flex; }
  .toggle__switch input{ position:absolute; opacity:0; width:100%; height:100%; margin:0; cursor:pointer; }
  .toggle__track{ position:relative; display:inline-block; width:34px; height:18px; background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:999px; transition:background .15s, border-color .15s; }
  .toggle__thumb{ position:absolute; top:1px; left:1px; width:14px; height:14px; border-radius:50%; background:var(--text-faint); transition:transform .15s, background .15s; }
  .toggle__switch input:checked + .toggle__track{ background:var(--accent-soft); border-color:var(--accent); }
  .toggle__switch input:checked + .toggle__track .toggle__thumb{ transform:translateX(16px); background:var(--accent); }
  .toggle__switch input:focus-visible + .toggle__track{ outline:2px solid var(--accent); outline-offset:2px; }
  .toggle__switch input:disabled + .toggle__track{ opacity:.45; cursor:not-allowed; }

  .stats-row{ display:flex; align-items:stretch; margin-bottom:18px; background:rgba(255,255,255,0.02); border:1px solid var(--border-soft); border-radius:var(--radius-md); padding:12px 8px; }
  .stat{ flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .stat__label{ font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; color:var(--text-faint); }
  .stat__value{ font-family:var(--font-mono); font-size:20px; font-weight:600; color:var(--text); letter-spacing:0.04em; }
  .stat__sep{ width:1px; background:var(--border-soft); margin:2px 0; }

  .score-pop{ animation:pop .26s ease; }
  @keyframes pop{ 0%{ transform:scale(1); } 40%{ transform:scale(1.18); color:var(--accent-strong); } 100%{ transform:scale(1); color:var(--text); } }

  .screen-bezel{ position:relative; padding:14px; border-radius:16px; background:linear-gradient(160deg,#1c1f25,#111316); border:1px solid var(--border); box-shadow:inset 0 2px 6px rgba(0,0,0,0.5); margin-bottom:18px; transition:box-shadow .18s; }
  .screen-bezel.is-eating{ box-shadow:inset 0 2px 6px rgba(0,0,0,0.5), 0 0 0 2px var(--accent); }
  .rivet{ position:absolute; width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.08); box-shadow:inset 0 1px 1px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,0,0,0.4); }
  .rivet--tl{ top:8px; left:8px; } .rivet--tr{ top:8px; right:8px; } .rivet--bl{ bottom:8px; left:8px; } .rivet--br{ bottom:8px; right:8px; }

  .screen{ position:relative; width:100%; aspect-ratio:1/1; border-radius:10px; overflow:hidden; background:#0c0d10; touch-action:none; box-shadow:inset 0 0 0 1px rgba(255,255,255,0.03); }
  .screen canvas{ display:block; width:100%; height:100%; }
  .scanlines{ position:absolute; inset:0; pointer-events:none; background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px); mix-blend-mode:overlay; opacity:.5; }

  .overlay{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(9,10,13,0.86); backdrop-filter:blur(2px); transition:opacity .2s ease; text-align:center; }
  .overlay.is-hidden{ opacity:0; pointer-events:none; }
  .overlay__content{ padding:24px; max-width:80%; }
  .overlay__eyebrow{ font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--text-faint); margin:0 0 8px; }
  .overlay__title{ font-size:26px; font-weight:700; margin:0 0 8px; letter-spacing:0.03em; transition:color .15s; }
  .overlay__title.is-danger{ color:var(--danger); }
  .overlay__sub{ font-family:var(--font-mono); font-size:12px; color:var(--text-muted); margin:0 0 20px; }

  .btn{ font-family:var(--font-mono); font-size:12px; letter-spacing:0.08em; padding:10px 22px; border-radius:var(--radius-sm); border:1px solid var(--border); background:rgba(255,255,255,0.03); color:var(--text); cursor:pointer; transition:transform .12s, background .15s, border-color .15s, opacity .15s; }
  .btn:hover:not(:disabled){ transform:translateY(-1px); }
  .btn:active:not(:disabled){ transform:translateY(0); }
  .btn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .btn:disabled{ opacity:.4; cursor:not-allowed; }
  .btn--primary{ background:var(--accent); border-color:var(--accent); color:#1a1206; font-weight:600; }
  .btn--primary:hover:not(:disabled){ background:var(--accent-strong); }
  .btn--ghost{ background:transparent; }

  .footer-row{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .hint{ font-family:var(--font-mono); font-size:11px; color:var(--text-muted); margin:0; display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
  kbd{ font-family:var(--font-mono); font-size:10px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-bottom-width:2px; border-radius:4px; padding:2px 5px; color:var(--text-muted); }
  .footer-actions{ display:flex; gap:8px; }

  .dpad{ display:none; }
  @media (max-width:560px){
    .title{ font-size:36px; }
    .dpad{ display:grid; grid-template-columns:52px 52px 52px; grid-template-rows:52px 52px; gap:6px; justify-content:center; margin-top:18px; }
    .dpad__btn{ font-size:16px; border-radius:10px; border:1px solid var(--border); background:rgba(255,255,255,0.04); color:var(--text-muted); cursor:pointer; }
    .dpad__btn:active{ background:var(--accent-soft); color:var(--accent-strong); }
    .dpad__btn--up{ grid-column:2; grid-row:1; }
    .dpad__btn--left{ grid-column:1; grid-row:2; }
    .dpad__btn--right{ grid-column:3; grid-row:2; }
    .dpad__btn--down{ grid-column:2; grid-row:2; }
    .footer-row .hint{ display:none; }
  }

  .credit{ font-family:var(--font-mono); font-size:11px; color:var(--text-faint); margin:0; }

  @media (prefers-reduced-motion:reduce){
    *, *::before, *::after{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
  }
</style>
</head>
<body>
  <div class="page">
    <div class="device" role="application" aria-label="Snake game">
      <header>
        <div class="eyebrow-row">
          <span class="eyebrow">ARCADE TERMINAL — 001</span>
          <span class="led" id="led"><span class="led__dot"></span><span id="ledLabel">READY</span></span>
        </div>
        <h1 class="title">SNAKE</h1>
      </header>

      <div class="divider"></div>

      <div class="settings-row">
        <div class="segmented" id="difficulty" role="radiogroup" aria-label="Difficulty">
          <button class="segmented__btn is-active" data-diff="easy" role="radio" aria-checked="true" type="button">EASY</button>
          <button class="segmented__btn" data-diff="normal" role="radio" aria-checked="false" type="button">NORMAL</button>
          <button class="segmented__btn" data-diff="hard" role="radio" aria-checked="false" type="button">HARD</button>
        </div>
        <label class="toggle">
          <span class="toggle__label">WRAP WALLS</span>
          <span class="toggle__switch">
            <input type="checkbox" id="wrapToggle">
            <span class="toggle__track"><span class="toggle__thumb"></span></span>
          </span>
        </label>
      </div>

      <div class="divider"></div>

      <div class="stats-row">
        <div class="stat"><span class="stat__label">SCORE</span><span class="stat__value" id="scoreVal">0000</span></div>
        <div class="stat__sep" aria-hidden="true"></div>
        <div class="stat"><span class="stat__label">LENGTH</span><span class="stat__value" id="lengthVal">003</span></div>
        <div class="stat__sep" aria-hidden="true"></div>
        <div class="stat"><span class="stat__label">HIGH</span><span class="stat__value" id="highVal">0000</span></div>
        <div class="stat__sep" aria-hidden="true"></div>
        <div class="stat"><span class="stat__label">SPEED</span><span class="stat__value" id="speedVal">01</span></div>
      </div>

      <div class="screen-bezel" id="bezel">
        <span class="rivet rivet--tl"></span>
        <span class="rivet rivet--tr"></span>
        <span class="rivet rivet--bl"></span>
        <span class="rivet rivet--br"></span>
        <div class="screen">
          <canvas id="game" aria-label="Snake game board"></canvas>
          <div class="scanlines" aria-hidden="true"></div>
          <div class="overlay" id="overlay">
            <div class="overlay__content">
              <p class="overlay__eyebrow" id="overlayEyebrow">SYSTEM READY</p>
              <h2 class="overlay__title" id="overlayTitle">PRESS START</h2>
              <p class="overlay__sub" id="overlaySub">Use arrow keys or WASD to move</p>
              <button class="btn btn--primary" id="overlayBtn" type="button">START</button>
            </div>
          </div>
        </div>
      </div>

      <div class="footer-row">
        <p class="hint"><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> / <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move&nbsp;&nbsp;<kbd>SPACE</kbd> pause&nbsp;&nbsp;<kbd>R</kbd> restart</p>
        <div class="footer-actions">
          <button class="btn btn--ghost" id="pauseBtn" type="button">PAUSE</button>
          <button class="btn btn--ghost" id="restartBtn" type="button">RESTART</button>
        </div>
      </div>

      <div class="dpad" id="dpad">
        <button class="dpad__btn dpad__btn--up" data-dir="up" aria-label="Move up" type="button">▲</button>
        <button class="dpad__btn dpad__btn--left" data-dir="left" aria-label="Move left" type="button">◀</button>
        <button class="dpad__btn dpad__btn--right" data-dir="right" aria-label="Move right" type="button">▶</button>
        <button class="dpad__btn dpad__btn--down" data-dir="down" aria-label="Move down" type="button">▼</button>
      </div>
    </div>
    <p class="credit">Built with HTML, CSS &amp; JavaScript — no frameworks.</p>
  </div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const GRID = 20;
  const CELL = 24;
  const BOARD = GRID * CELL;
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = BOARD * DPR;
  canvas.height = BOARD * DPR;
  ctx.scale(DPR, DPR);

  const COLORS = {
    bg: '#0c0d10',
    grid: 'rgba(255,255,255,0.035)',
    head: '#ffae73',
    body: '#ff8a3d',
    food: '#5fe3b3',
    foodGlow: 'rgba(95,227,179,0.55)'
  };

  const DIFF = {
    easy:   { base: 150, scoreStep: 10 },
    normal: { base: 115, scoreStep: 15 },
    hard:   { base: 85,  scoreStep: 20 }
  };
  const MIN_TICK = 55;

  let snake, dir, pendingDir, food, score, highScore = 0, foodsEaten, speedLevel;
  let state = 'ready', wrap = false, difficulty = 'easy';
  let lastStepTime = 0;

  const els = {
    score: document.getElementById('scoreVal'),
    length: document.getElementById('lengthVal'),
    high: document.getElementById('highVal'),
    speed: document.getElementById('speedVal'),
    led: document.getElementById('led'),
    ledLabel: document.getElementById('ledLabel'),
    overlay: document.getElementById('overlay'),
    overlayEyebrow: document.getElementById('overlayEyebrow'),
    overlayTitle: document.getElementById('overlayTitle'),
    overlaySub: document.getElementById('overlaySub'),
    overlayBtn: document.getElementById('overlayBtn'),
    pauseBtn: document.getElementById('pauseBtn'),
    restartBtn: document.getElementById('restartBtn'),
    wrapToggle: document.getElementById('wrapToggle'),
    diffGroup: document.getElementById('difficulty'),
    bezel: document.getElementById('bezel')
  };

  function pad(n, len) { return String(n).padStart(len, '0'); }

  function reset() {
    const mid = Math.floor(GRID / 2);
    snake = [ {x:mid-1,y:mid}, {x:mid-2,y:mid}, {x:mid-3,y:mid} ];
    dir = {x:1, y:0};
    pendingDir = null;
    score = 0;
    foodsEaten = 0;
    speedLevel = 1;
    spawnFood();
    updateStatsUI();
  }

  function spawnFood() {
    let cell;
    do {
      cell = { x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID) };
    } while (snake.some(s => s.x === cell.x && s.y === cell.y));
    food = cell;
  }

  function currentTick() {
    const d = DIFF[difficulty];
    return Math.max(MIN_TICK, d.base - (speedLevel - 1) * 8);
  }

  function setState(next) {
    state = next;
    els.led.classList.remove('is-running','is-paused','is-over');
    if (state === 'running') { els.led.classList.add('is-running'); els.ledLabel.textContent = 'RUNNING'; }
    else if (state === 'paused') { els.led.classList.add('is-paused'); els.ledLabel.textContent = 'PAUSED'; }
    else if (state === 'over') { els.led.classList.add('is-over'); els.ledLabel.textContent = 'GAME OVER'; }
    else { els.ledLabel.textContent = 'READY'; }

    const lock = state === 'running';
    els.diffGroup.querySelectorAll('.segmented__btn').forEach(b => b.disabled = lock);
    els.wrapToggle.disabled = lock;
    els.pauseBtn.disabled = state === 'ready' || state === 'over';
    els.pauseBtn.textContent = state === 'paused' ? 'RESUME' : 'PAUSE';
  }

  function showOverlay(eyebrow, title, sub, btnText, danger) {
    els.overlayEyebrow.textContent = eyebrow;
    els.overlayTitle.textContent = title;
    els.overlayTitle.classList.toggle('is-danger', !!danger);
    els.overlaySub.textContent = sub;
    els.overlayBtn.textContent = btnText;
    els.overlay.classList.remove('is-hidden');
  }
  function hideOverlay() { els.overlay.classList.add('is-hidden'); }

  function startGame() {
    if (state === 'over') reset();
    setState('running');
    hideOverlay();
    lastStepTime = performance.now();
  }

  function togglePause() {
    if (state === 'running') {
      setState('paused');
      showOverlay('SYSTEM PAUSED', 'PAUSED', "Resume whenever you're ready", 'RESUME');
    } else if (state === 'paused') {
      startGame();
    }
  }

  function restartNow() {
    reset();
    startGame();
  }

  function gameOver() {
    setState('over');
    if (score > highScore) highScore = score;
    updateStatsUI();
    showOverlay('SYSTEM HALTED', 'GAME OVER', 'Final score ' + pad(score,4), 'PLAY AGAIN', true);
  }

  function updateStatsUI() {
    els.score.textContent = pad(score,4);
    els.length.textContent = pad(snake.length,3);
    els.high.textContent = pad(highScore,4);
    els.speed.textContent = pad(speedLevel,2);
  }

  function pulseScore() {
    els.score.classList.remove('score-pop');
    void els.score.offsetWidth;
    els.score.classList.add('score-pop');
  }

  function pulseScreen() {
    els.bezel.classList.add('is-eating');
    setTimeout(() => els.bezel.classList.remove('is-eating'), 180);
  }

  function setDirection(nx, ny) {
    if (state === 'ready') startGame();
    if (state !== 'running') return;
    if (dir.x === -nx && dir.y === -ny && snake.length > 1) return;
    pendingDir = {x:nx, y:ny};
  }

  function step() {
    if (pendingDir) { dir = pendingDir; pendingDir = null; }
    const head = snake[0];
    let nx = head.x + dir.x, ny = head.y + dir.y;
    if (wrap) {
      nx = (nx + GRID) % GRID;
      ny = (ny + GRID) % GRID;
    } else if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) {
      return gameOver();
    }
    const willEat = nx === food.x && ny === food.y;
    const bodyToCheck = willEat ? snake : snake.slice(0, -1);
    if (bodyToCheck.some(s => s.x === nx && s.y === ny)) return gameOver();

    snake.unshift({x:nx, y:ny});
    if (willEat) {
      score += DIFF[difficulty].scoreStep;
      foodsEaten++;
      speedLevel = 1 + Math.floor(foodsEaten / 5);
      spawnFood();
      pulseScore();
      pulseScreen();
    } else {
      snake.pop();
    }
    updateStatsUI();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  function render(time) {
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, BOARD, BOARD);

    ctx.strokeStyle = COLORS.grid;
    ctx.lineWidth = 1;
    for (let i = 1; i < GRID; i++) {
      ctx.beginPath(); ctx.moveTo(i*CELL+0.5, 0); ctx.lineTo(i*CELL+0.5, BOARD); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i*CELL+0.5); ctx.lineTo(BOARD, i*CELL+0.5); ctx.stroke();
    }

    const pulse = 1 + 0.12 * Math.sin(time / 220);
    const fx = food.x*CELL + CELL/2, fy = food.y*CELL + CELL/2;
    ctx.save();
    ctx.shadowColor = COLORS.foodGlow;
    ctx.shadowBlur = 14;
    ctx.fillStyle = COLORS.food;
    ctx.beginPath();
    ctx.arc(fx, fy, (CELL*0.28) * pulse, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    const len = snake.length;
    snake.forEach((seg, i) => {
      const t = i / Math.max(1, len-1);
      ctx.globalAlpha = 1 - t*0.6;
      ctx.fillStyle = i === 0 ? COLORS.head : COLORS.body;
      const inset = 3;
      roundRect(seg.x*CELL+inset, seg.y*CELL+inset, CELL-inset*2, CELL-inset*2, 6);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function loop(time) {
    if (state === 'running' && time - lastStepTime >= currentTick()) {
      step();
      lastStepTime = time;
    }
    render(time);
    requestAnimationFrame(loop);
  }

  const KEYMAP = {
    ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0],
    w:[0,-1], s:[0,1], a:[-1,0], d:[1,0],
    W:[0,-1], S:[0,1], A:[-1,0], D:[1,0]
  };

  window.addEventListener('keydown', (e) => {
    if (e.key === ' ') {
      e.preventDefault();
      if (state === 'running' || state === 'paused') togglePause();
      else if (state === 'ready') startGame();
      return;
    }
    if (e.key === 'r' || e.key === 'R') { restartNow(); return; }
    const v = KEYMAP[e.key];
    if (v) { e.preventDefault(); setDirection(v[0], v[1]); }
  });

  els.overlayBtn.addEventListener('click', startGame);
  els.pauseBtn.addEventListener('click', togglePause);
  els.restartBtn.addEventListener('click', restartNow);
  els.wrapToggle.addEventListener('change', (e) => { wrap = e.target.checked; });

  els.diffGroup.querySelectorAll('.segmented__btn').forEach(btn => {
    btn.addEventListener('click', () => {
      els.diffGroup.querySelectorAll('.segmented__btn').forEach(b => {
        b.classList.remove('is-active'); b.setAttribute('aria-checked','false');
      });
      btn.classList.add('is-active'); btn.setAttribute('aria-checked','true');
      difficulty = btn.dataset.diff;
    });
  });

  let touchStart = null;
  const screenEl = document.querySelector('.screen');
  screenEl.addEventListener('touchstart', (e) => {
    const t = e.touches[0]; touchStart = {x:t.clientX, y:t.clientY};
  }, {passive:true});
  screenEl.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x, dy = t.clientY - touchStart.y;
    if (Math.abs(dx) > 24 || Math.abs(dy) > 24) {
      if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 1 : -1, 0);
      else setDirection(0, dy > 0 ? 1 : -1);
    }
    touchStart = null;
  });

  document.getElementById('dpad').querySelectorAll('.dpad__btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const map = {up:[0,-1], down:[0,1], left:[-1,0], right:[1,0]};
      const v = map[btn.dataset.dir];
      setDirection(v[0], v[1]);
    });
  });

  reset();
  setState('ready');
  showOverlay('SYSTEM READY', 'PRESS START', 'Use arrow keys or WASD to move', 'START');
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
